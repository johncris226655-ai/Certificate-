<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subject Database Checker</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .card { background: white; color: #000; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        .death-cert { 
            display: none; background: #fff; color: #000; border: 10px double #000; 
            padding: 40px; margin-top: 20px; width: 210mm; height: 297mm; /* A4 Ratio */
            position: relative; box-sizing: border-box;
        }
        .stamp { color: #b30000; border: 4px solid #b30000; display: inline-block; padding: 5px; transform: rotate(-15deg); font-weight: bold; position: absolute; top: 50px; right: 50px; }
    </style>
</head>
<body>

<div class="card" id="search-box">
    <h2 style="color:red">DATABASE ACCESS</h2>
    <input type="text" id="code-in" placeholder="Enter 5-Digit ID" style="width:70%; padding:10px;">
    <button onclick="checkInfo()" style="padding:10px;">SEARCH</button>
</div>

<div id="result" class="card" style="display:none; margin-top:20px;">
    <div id="info-display"></div>
    <button onclick="generateDC()" style="background:red; color:white; width:100%; padding:15px; margin-top:10px;">CREATE DEATH CERTIFICATE</button>
</div>

<div id="death-certificate" class="death-cert">
    <h1 style="text-align:center;">CERTIFICATE OF DEATH</h1>
    <div class="stamp">OFFICIALLY DECEASED</div>
    <hr>
    <div id="dc-content" style="font-size: 1.2rem; line-height: 2;"></div>
    <div style="margin-top: 50px; display: flex; justify-content: space-between;">
        <div>
            <p>____________________</p>
            <p>Subject Signature</p>
            <img id="dc-sig" src="" style="height: 50px; margin-top: -60px; display: block;">
        </div>
        <div>
            <p>____________________</p>
            <p>Dr. J. Refuerzo, MD</p>
            <p style="font-style: italic; color: blue; margin-top: -60px;">Refuerzo</p>
        </div>
    </div>
</div>

<script>
    function checkInfo() {
        const code = document.getElementById('code-in').value;
        const data = JSON.parse(localStorage.getItem(code));
        if(!data) return alert("ID Not Found");

        document.getElementById('result').style.display = 'block';
        document.getElementById('info-display').innerHTML = `
            <img src="${data.photo}" style="width:100%">
            <h3>NAME: ${data.name}</h3>
            <p>DOB: ${data.dob}</p>
            <p>BLOOD TYPE: ${data.blood}</p>
        `;
        window.activeData = data;
    }

    function generateDC() {
        const causes = ["Acute Cardiac Arrest", "Game Over: Elimination", "Multiple Organ Failure", "System Malfunction", "Blood Loss"];
        const randomCause = causes[Math.floor(Math.random() * causes.length)];
        const data = window.activeData;

        document.getElementById('death-certificate').style.display = 'block';
        document.getElementById('dc-content').innerHTML = `
            <p>This certifies that <b>${data.name}</b>, with Blood Type <b>${data.blood}</b>, 
            born on <b>${data.dob}</b>, has been processed.</p>
            <p><b>CAUSE OF DEATH:</b> ${randomCause}</p>
            <p><b>DATE OF RECORD:</b> ${new Date().toLocaleDateString()}</p>
        `;
        document.getElementById('dc-sig').src = data.sig;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
